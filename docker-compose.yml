version: '3.8'

services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tourkia_db
      POSTGRES_USER: tourkia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourkia -d tourkia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend (Gunicorn) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://tourkia:${DB_PASSWORD:-changeme}@db:5432/tourkia_db
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-info@tourkia.com}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_media:/app/media

  # ─── Next.js Frontend ───
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy (optional, uncomment for production) ───
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./nginx/ssl:/etc/nginx/ssl
  #   depends_on:
  #     - frontend
  #     - backend

  # ─────────────────────────────────────────────────────────────────────────────
  # DISASTER-RECOVERY-PROTOCOL: Otomatik Yedekleme Servisi
  # Her gece 04:00 UTC'de şifreli yedek alır ve S3/GCS'e yükler.
  # Ana sunucu tamamen çökse bile bu servis izole çalışmaya devam eder.
  # ─────────────────────────────────────────────────────────────────────────────
  backup-cron:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "
        echo '# Tourkia DR Backup Cron' > /etc/cron.d/backup &&
        echo '0 4 * * * root cd /app && /app/venv/bin/python manage.py backup_database --destination s3 >> /var/log/backup.log 2>&1' >> /etc/cron.d/backup &&
        chmod 0644 /etc/cron.d/backup &&
        crontab /etc/cron.d/backup &&
        cron -f
      "
    environment:
      - DATABASE_URL=postgres://tourkia:${DB_PASSWORD:-changeme}@db:5432/tourkia_db
      - SECRET_KEY=${SECRET_KEY}
      # Şifreleme anahtarı (cryptography.fernet.Fernet.generate_key() ile üret)
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
      # AWS S3 Kimlik Bilgileri
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-tourkia-backups-dr}
      # Admin Alarm E-postası
      - ADMIN_ALERT_EMAIL=${ADMIN_ALERT_EMAIL:-admin@tourkia.com}
    volumes:
      - backup_data:/app/backups         # Yerel yedek dizini
      - backup_logs:/var/log             # Cron log'ları
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  backend_media:
  # ─── DR Yedekleme Hacimleri ───────────────────────────────────────────────
  backup_data:    # Şifreli yedek dosyaları (7 gün saklama)
  backup_logs:    # Yedekleme işlem logları
